syntax = "proto3";

package IAM_TENANT_SERVICE;

service IamTenantService {
  //==================== Quản lý Tenant (Dành cho System Admin) ====================//
  rpc CreateTenant(CreateTenantRequest) returns (TenantResponse);
  rpc GetTenant(GetTenantRequest) returns (TenantResponse);
  rpc UpdateTenantStatus(UpdateTenantStatusRequest) returns (TenantResponse);

  //==================== Quản lý Staff Nội bộ Tenant (Dành cho Tenant Admin / Director) ====================//
  rpc CreateStaff(CreateStaffRequest) returns (StaffResponse);
  rpc GetStaff(GetStaffRequest) returns (StaffResponse);
  rpc GetManyStaffs(GetManyStaffsRequest) returns (GetManyStaffsResponse);
  rpc UpdateStaffRoles(UpdateStaffRolesRequest) returns (StaffResponse);
  rpc UpdateStaffStatus(UpdateStaffStatusRequest) returns (StaffResponse);

  //==================== Đồng bộ Xác thực & Phân quyền (Dành cho BFF Gateway) ====================//
  rpc AuthenticateUser(TenantLoginRequest) returns (TenantLoginResponse);
  rpc GetUserPermissions(GetPermissionsRequest) returns (GetPermissionsResponse);
}

//==================== Các Message Thực Thể Gốc ====================//

message TenantResponse {
  string id = 1;
  string name = 2;          // Tên công ty đầy đủ (Ví dụ: Cube System)
  string tenantCode = 3;    // Mã code định danh (Ví dụ: cube) - Dùng để điền ở Field Login
  string planType = 4;      // Cấp độ gói: "STANDARD" | "ENTERPRISE"
  string status = 5;        // Trạng thái: "ACTIVE" | "SUSPENDED"
  string adminEmail = 6;    // Email của người sở hữu (Director)
  string createdAt = 7;
  string updatedAt = 8;
}

message StaffResponse {
  string id = 1;
  string tenantId = 2;
  string firstName = 3;
  string lastName = 4;
  string email = 5;
  string phoneNumber = 6;
  string status = 7;        // "ACTIVE" | "INACTIVE" | "BLOCKED"
  repeated string roles = 8; // Một tài khoản có thể có nhiều Role (Ví dụ: ["FleetDispatcher", "Accountant"])
  string createdAt = 9;
  string updatedAt = 10;
}

message PermissionInfo {
  string id = 1;
  string module = 2;        // Ví dụ: "ocr", "tracking", "billing"
  string path = 3;          // API Endpoint hoặc Route FE
  string method = 4;        // HTTP Method: "GET", "POST", "PUT", "DELETE"
}

//==================== DTO Requests & Responses ====================//

// Khởi tạo một doanh nghiệp mới trên hệ thống Aurora
message CreateTenantRequest {
  optional string processId = 1;
  string name = 2;
  string tenantCode = 3;
  string adminEmail = 4;
  string adminFirstName = 5;
  string adminLastName = 6;
  string planType = 7;
}

message GetTenantRequest {
  optional string processId = 1;
  optional string id = 2;
  optional string tenantCode = 3;
}

message UpdateTenantStatusRequest {
  string tenantId = 1;
  string status = 2;
}

// Giám đốc (Tenant Admin) tự chủ động tạo tài khoản nội bộ cho nhân viên
message CreateStaffRequest {
  optional string processId = 1;
  string tenantId = 2;
  string firstName = 3;
  string lastName = 4;
  string email = 5;
  string phoneNumber = 6;
  repeated string roles = 7; // Gán các vai trò chuyên môn ban đầu
}

message GetStaffRequest {
  optional string processId = 1;
  string id = 2;
  string tenantId = 3;
}

message GetManyStaffsRequest {
  optional string processId = 1;
  string tenantId = 2;
  int32 page = 3;
  int32 limit = 4;
  optional string roleName = 5;
  optional string status = 6;
}

message GetManyStaffsResponse {
  repeated StaffResponse staffs = 1;
  int32 page = 2;
  int32 limit = 3;
  int32 totalItems = 4;
  int32 totalPages = 5;
}

// Tính năng gán thêm hoặc bớt Role cho nhân viên (Nhiều Role cùng lúc)
message UpdateStaffRolesRequest {
  optional string processId = 1;
  string staffId = 2;
  string tenantId = 3;
  repeated string roles = 4; 
}

message UpdateStaffStatusRequest {
  string staffId = 1;
  string tenantId = 2;
  string status = 3;
}

// Luồng xử lý Login 3 Fields tập trung tại aurora.com
message TenantLoginRequest {
  optional string processId = 1;
  string tenantCode = 2;    // Trường bắt buộc người dùng nhập (Ví dụ: "cube")
  string email = 3;
  string password = 4;
}

message TenantLoginResponse {
  string accessToken = 1;   // Trả về cho BFF đóng gói thành Cookie
  string refreshToken = 2;
  int32 expiresIn = 3;
  string tenantId = 4;
  string userId = 5;
  repeated string roles = 6;
}

// BFF gọi để bóc tách toàn bộ quyền cụ thể nạp vào Session/Frontend
message GetPermissionsRequest {
  string userId = 1;
  string tenantId = 2;
}

message GetPermissionsResponse {
  string userId = 1;
  string tenantId = 2;
  repeated string roles = 3;
  repeated PermissionInfo permissions = 4; // Trả về mảng các quyền cụ thể phục vụ PBAC
}